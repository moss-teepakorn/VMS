<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Village Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        const villageName = localStorage.getItem('vms-setup-village-name') || 'The Greenfield'
        document.title = villageName + ' — Village Management System'
      } catch (_) {}

      // Ignore known runtime noise from browser extensions injected as webextension.js.
      window.addEventListener('error', (event) => {
        const source = String(event?.filename || '')
        const message = String(event?.message || '')
        const isWebExtensionNoise = source.includes('webextension.js')
          || (message.includes("Cannot read properties of null (reading '1')") && source.includes('extension'))

        if (!isWebExtensionNoise) return
        if (typeof event.preventDefault === 'function') event.preventDefault()
        if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation()
      }, true)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
